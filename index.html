<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>YEAR — 2026</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#ff4d00" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Year Tracker" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="icon" href="icons/icon-192.png" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <canvas id="bgCanvas"></canvas>

  <div class="page">

    <!-- HEADER -->
    <header>
      
      <div class="brand" id="brandYear">20<span>26</span></div>
      <div class="header-right">
        <div class="header-date" id="headerDate">—</div>
        <div class="header-daynum" id="headerDayNum">DAY 0</div>
      </div>
    </header>

    <!-- GRID -->
    <section class="grid-section">
      <div class="grid-label">Every dot is a day — this is your year</div>
      <div class="grid" id="grid"></div>
    </section>

    <!-- STATS -->
    <section class="stats-row">
      <div class="stat">
        <div class="stat-value orange" id="statDone">—</div>
        <div class="stat-label">Passed</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <div class="stat-value white" id="statTotal">365</div>
        <div class="stat-label">Total</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <div class="stat-value dim" id="statLeft">—</div>
        <div class="stat-label">Left</div>
      </div>
    </section>

    <!-- QUOTE -->
    <div class="quote" id="quoteEl">"The days are long, but the years are short."</div>

    <!-- FOOTER -->
    <footer>
      <div class="footer-top">
        <div class="footer-left">
          <div class="footer-title">Year Completed</div>
          <div class="footer-pct-big" id="footerPct">0%</div>
          <div class="footer-sub" id="footerSub">of 2026 is gone forever</div>
        </div>
        <div class="footer-right">
          <div class="footer-days-left" id="footerDaysLeft">— days</div>
          <div class="footer-days-label">still remaining</div>
        </div>
      </div>

      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
        <div class="progress-markers" id="progressMarkers"></div>
      </div>

      <div class="made-with-love">
        Made with <span class="heart">❤️</span> — Aman Gupta
      </div>
    </footer>

  </div>

  <div id="tooltip"></div>
  <script src="script.js"></script>
</body>
</html>
