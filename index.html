<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YEAR — 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <canvas id="bgCanvas"></canvas>

  <div class="page">

    <!-- HEADER -->
    <header>
      <div class="brand" id="brandYear">20<span>26</span></div>
      <div class="header-right">
        <div class="header-date" id="headerDate">—</div>
        <div class="header-daynum" id="headerDayNum">000</div>
      </div>
    </header>

    <!-- MAIN -->
    <main>

      <div class="grid-wrap">
        <div class="grid-label">Every dot is a day — this is your year</div>
        <div class="grid" id="grid"></div>
      </div>

      <div class="stats-row">
        <div class="stat">
          <div class="stat-value orange" id="statDone">—</div>
          <div class="stat-label">Days Passed</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
          <div class="stat-value white" id="statTotal">365</div>
          <div class="stat-label">Total Days</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
          <div class="stat-value dim" id="statLeft">—</div>
          <div class="stat-label">Days Left</div>
        </div>
      </div>

      <div class="quote" id="quoteEl">
        "The days are long, but the years are short."
      </div>

    </main>

    <!-- FOOTER -->
    <footer>
      <div class="footer-top">
        <div class="footer-left">
          <div class="footer-title">Year Completed</div>
          <div class="footer-pct-big" id="footerPct">0%</div>
          <div class="footer-sub" id="footerSub">of 2026 is gone forever</div>
        </div>
        <div class="footer-right">
          <div class="footer-days-left" id="footerDaysLeft">— days</div>
          <div class="footer-days-label">still remaining</div>
        </div>
      </div>

      <!-- Progress bar with month ticks -->
      <div class="progress-track" id="progressTrack">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
        <div class="progress-markers" id="progressMarkers"></div>
      </div>
    </footer>

  </div>

  <div id="tooltip"></div>

  <script src="script.js"></script>
</body>
</html>
